<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri_Lv | Siright - Developer Portfolio</title>
    <style>
        :root {
            --bg: #150822;
            --term-bg: rgba(12, 5, 20, 0.9);
            --purple: #b24aff;
            --red: #ff2266;
            --text: #e8e8e8;
            --dim: #666;
            --border: #2a1445;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .noise {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.1) 2px,
                rgba(0,0,0,0.1) 4px
            );
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
        }

        .terminal {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 780px;
            height: 78vh;
            background: var(--term-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 12px 40px rgba(80, 0, 120, 0.4);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(6px);
        }

        .titlebar {
            background: linear-gradient(to bottom, #241238, #1a0d28);
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 7px 7px 0 0;
            font-size: 13px;
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dim);
        }

        .titlebar-left svg {
            width: 14px;
            height: 14px;
            fill: var(--purple);
        }

        .wm-buttons {
            display: flex;
            gap: 4px;
        }

        .wm-btn {
            width: 26px;
            height: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            color: var(--dim);
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }

        .wm-btn:hover { background: rgba(178, 74, 255, 0.2); }
        .wm-btn.x:hover { background: rgba(255, 34, 102, 0.3); }

        .content {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.55;
        }

        .content::-webkit-scrollbar { width: 5px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .ps1 { color: var(--red); }
        .dir { color: var(--purple); }
        .cmd { color: #fff; }

        .block {
            margin-bottom: 16px;
            animation: fadein 0.35s ease;
        }

        @keyframes fadein {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .grid {
            display: grid;
            grid-template-columns: 115px 1fr;
            gap: 6px;
            margin-top: 6px;
        }

        .lbl { color: var(--purple); }

        a {
            color: var(--red);
            text-decoration: none;
            border-bottom: 1px dashed;
        }
        a:hover {
            background: var(--red);
            color: #000;
        }

        .tag {
            display: inline-block;
            padding: 1px 7px;
            border: 1px solid;
            border-radius: 3px;
            font-size: 13px;
            margin: 2px 3px 2px 0;
        }

        .caret {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--purple);
            vertical-align: text-bottom;
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .content { font-size: 14px; }
        }
    </style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="noise"></div>

<div class="terminal">
    <div class="titlebar">
        <div class="titlebar-left">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10z"/></svg>
            <span>siright@endeavouros:~/portfolio</span>
        </div>
        <div class="wm-buttons">
            <div class="wm-btn">−</div>
            <div class="wm-btn">◻</div>
            <div class="wm-btn x">✕</div>
        </div>
    </div>
    <div class="content" id="out"></div>
</div>

<script>
var canvas = document.getElementById('bg');
var ctx = canvas.getContext('2d');
var W, H, cols, drops;

function resize() {
    W = canvas.width = innerWidth;
    H = canvas.height = innerHeight;
    cols = Math.floor(W / 22);
    drops = [];
    for (var i = 0; i < cols; i++) drops[i] = Math.random() * -50;
}
resize();
addEventListener('resize', resize);

var tick = 0;

function render() {
    ctx.fillStyle = 'rgba(21, 8, 34, 0.035)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '17px monospace';

    for (var i = 0; i < cols; i++) {
        var ch = String(Math.floor(Math.random() * 10));
        var x = i * 22;
        var y = drops[i] * 20;

        var hue = 280 + Math.sin(tick * 0.003 + i * 0.15) * 40;
        ctx.fillStyle = 'hsl(' + hue + ', 100%, 60%)';
        ctx.fillText(ch, x, y);

        if (y > H && Math.random() > 0.99) drops[i] = 0;
        else drops[i] += 0.15;
    }
    tick++;
    requestAnimationFrame(render);
}
render();

var out = document.getElementById('out');
var lines = [
    { c: './whoami.sh', o: '<div class="grid"><span class="lbl">Имя:</span><span>Роман</span><span class="lbl">Псевдоним:</span><span>Siri_Lv // Siright</span><span class="lbl">OS:</span><span style="color:#0df">EndeavourOS</span> (Arch-based)</div>' },
    { c: 'cat skills.txt', o: '<div style="margin-top:5px"><span class="lbl">Языки:</span><br><span class="tag" style="border-color:#3776ab;color:#3776ab">Python (Main)</span><span class="tag" style="border-color:#00599C;color:#00599C">C++</span><span class="tag" style="border-color:#f89820;color:#f89820">Java</span><span class="tag" style="border-color:#5566aa;color:#aaf">Lua</span><span class="tag" style="border-color:#68217A;color:#dcb3ff">C#</span></div><div style="margin-top:10px"><span class="lbl">Движки:</span> Godot Engine<br><span class="lbl">Инфраструктура:</span> 3 сервера (2x <span style="color:#fc0">DE</span>, 1x <span style="color:#4488ff">UK</span>)</div>' },
    { c: 'ls -la ./projects/', o: '<table style="width:100%;margin-top:5px"><tr><td style="padding:4px 0"><a href="https://t.me/Siright_Bot" target="_blank">Ai Telegram Bot</a></td><td style="color:var(--dim)">[Telegram Bot]</td></tr><tr><td style="padding:4px 0">Api Keys Parser</td><td style="color:var(--dim)">[Github/Web Scanner]</td></tr><tr><td style="padding:4px 0"><a href="https://pypi.org/project/ekogram" target="_blank">ekogram</a></td><td style="color:var(--dim)">[Python PyPI Module]</td></tr><tr><td style="padding:4px 0">Godot Games</td><td style="color:var(--dim)">[GameDev]</td></tr></table>' },
    { c: '', o: '' }
];

function prompt() {
    return '<span class="ps1">[siright@endeavouros]</span> <span class="dir">~</span>$ ';
}

function sleep(ms) {
    return new Promise(function(r) { setTimeout(r, ms); });
}

async function type(str, el) {
    for (var i = 0; i < str.length; i++) {
        el.textContent += str[i];
        await sleep(35 + Math.random() * 55);
    }
}

async function main() {
    for (var i = 0; i < lines.length; i++) {
        var row = document.createElement('div');
        row.innerHTML = prompt();
        var cmd = document.createElement('span');
        cmd.className = 'cmd';
        row.appendChild(cmd);
        var cur = document.createElement('span');
        cur.className = 'caret';
        row.appendChild(cur);
        out.appendChild(row);
        out.scrollTop = out.scrollHeight;

        if (lines[i].c) {
            await type(lines[i].c, cmd);
            await sleep(200);
            cur.remove();
            var blk = document.createElement('div');
            blk.className = 'block';
            blk.innerHTML = lines[i].o;
            out.appendChild(blk);
            await sleep(450);
        }
        out.scrollTop = out.scrollHeight;
    }
}

setTimeout(main, 700);
</script>

</body>
</html>

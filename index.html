<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri_Lv | Siright - Developer Portfolio</title>
    <style>
        :root {
            --bg-color: #050005;
            --term-bg: rgba(20, 0, 20, 0.85);
            --primary: #bd00ff; /* Фиолетовый */
            --secondary: #ff0055; /* Красный */
            --text-main: #eaeaea;
            --text-dim: #888;
            --font-stack: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            overflow: hidden; /* Чтобы скролл не появлялся из-за канваса */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Canvas Background */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* CRT Scanline Effect Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none; /* Пропускает клики сквозь себя */
            opacity: 0.6;
        }

        /* Main Terminal Window */
        .terminal-window {
            position: relative;
            z-index: 3;
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: var(--term-bg);
            border: 2px solid var(--primary);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.3), inset 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(5px);
            animation: fadeIn 1s ease-out;
        }

        /* Terminal Header */
        .terminal-header {
            background: linear-gradient(90deg, rgba(189,0,255,0.2), rgba(255,0,85,0.2));
            padding: 10px 15px;
            border-bottom: 1px solid var(--primary);
            display: flex;
            align-items: center;
            border-radius: 8px 8px 0 0;
        }

        .dots {
            display: flex;
            gap: 8px;
            margin-right: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .title {
            font-size: 14px;
            color: var(--text-main);
            font-weight: bold;
            opacity: 0.8;
        }

        /* Terminal Body */
        .terminal-body {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            font-size: 16px;
            line-height: 1.5;
        }

        /* Custom Scrollbar */
        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-body::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* Typography & Elements */
        .prompt {
            color: var(--secondary);
            font-weight: bold;
        }
        .path {
            color: var(--primary);
            font-weight: bold;
        }
        .command {
            color: #fff;
        }

        .output {
            margin-bottom: 20px;
            opacity: 0; /* Скрыто до анимации */
            animation: textFadeIn 0.5s forwards;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .label {
            color: var(--primary);
            font-weight: bold;
        }

        a {
            color: var(--secondary);
            text-decoration: none;
            border-bottom: 1px dashed var(--secondary);
            transition: all 0.3s;
        }

        a:hover {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 10px var(--secondary);
        }

        .lang-tag {
            display: inline-block;
            padding: 2px 6px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-size: 0.8em;
            margin-right: 5px;
            color: var(--text-main);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: var(--secondary);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        /* Animations */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes textFadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .label {
                margin-bottom: -5px;
                display: block;
            }
        }
    </style>
</head>
<body>

    <!-- Матричный фон -->
    <canvas id="matrixCanvas"></canvas>
    
    <!-- Эффект старого монитора -->
    <div class="scanlines"></div>

    <!-- Окно терминала -->
    <div class="terminal-window">
        <div class="terminal-header">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="title">siright@endeavouros: ~/portfolio</div>
        </div>
        <div class="terminal-body" id="terminalContent">
            <!-- Контент будет добавлен через JS -->
        </div>
    </div>

    <script>
        // --- 1. MATRIX BACKGROUND (Оптимизированный) ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const cols = Math.floor(width / 20) + 1;
        const ypos = Array(cols).fill(0);

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // Сброс позиций при ресайзе не обязателен, но желателен для красоты
        });

        function matrix() {
            // Полупрозрачный черный слой для следа
            ctx.fillStyle = 'rgba(5, 0, 5, 0.05)'; 
            ctx.fillRect(0, 0, width, height);

            ctx.font = '15pt monospace';

            ypos.forEach((y, ind) => {
                // Случайные числа 0-9
                const text = Math.floor(Math.random() * 10).toString();
                
                // Градиент цвета: Рандом между фиолетовым и красным
                const isRed = Math.random() > 0.5;
                ctx.fillStyle = isRed ? '#ff0055' : '#bd00ff';

                const x = ind * 20;
                ctx.fillText(text, x, y);

                // Случайный сброс столбца, если он ушел за экран
                if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
                else ypos[ind] = y + 20;
            });
            
            requestAnimationFrame(matrix);
        }

        requestAnimationFrame(matrix);

        // --- 2. TERMINAL LOGIC ---
        
        const terminalContent = document.getElementById('terminalContent');

        // Данные для вывода
        const data = [
            {
                cmd: './whoami.sh',
                output: `
                    <div class="info-grid">
                        <span class="label">Имя:</span> <span>Роман</span>
                        <span class="label">Псевдоним:</span> <span>Siri_Lv <span style="color:var(--text-dim)">//</span> Siright</span>
                        <span class="label">OS:</span> <span style="color: #00ddff">EndeavourOS</span> (Arch-based)
                    </div>
                `
            },
            {
                cmd: 'cat skills.txt',
                output: `
                    <div style="margin-top:5px">
                        <span class="label">Языки:</span><br>
                        <span class="lang-tag" style="border-color:#3776ab; color:#3776ab">Python (Main)</span>
                        <span class="lang-tag" style="border-color:#00599C; color:#00599C">C++</span>
                        <span class="lang-tag" style="border-color:#f89820; color:#f89820">Java</span>
                        <span class="lang-tag" style="border-color:#000080; color:#aaaaff">Lua</span>
                        <span class="lang-tag" style="border-color:#68217A; color:#dcb3ff">C#</span>
                    </div>
                    <div style="margin-top:10px">
                        <span class="label">Движки:</span> Godot Engine<br>
                        <span class="label">Инфраструктура:</span> 3 сервера (2x <span style="color:#ffcc00">DE</span>, 1x <span style="color:#00247d">UK</span>)
                    </div>
                `
            },
            {
                cmd: 'ls -la ./projects/',
                output: `
                    <table style="width:100%; text-align:left; margin-top:5px; border-collapse: collapse;">
                        <tr>
                            <td style="padding: 4px 0;"><a href="https://t.me/Siright_Bot" target="_blank">Ai Telegram Bot</a></td>
                            <td style="color:var(--text-dim)">[Telegram Bot]</td>
                        </tr>
                        <tr>
                            <td style="padding: 4px 0;"><span style="color:var(--text-main)">Api Keys Parser</span></td>
                            <td style="color:var(--text-dim)">[Github/Web Scanner]</td>
                        </tr>
                        <tr>
                            <td style="padding: 4px 0;"><a href="https://pypi.org/project/ekogram" target="_blank">ekogram</a></td>
                            <td style="color:var(--text-dim)">[Python PyPI Module]</td>
                        </tr>
                        <tr>
                            <td style="padding: 4px 0;"><span style="color:var(--text-main)">Godot Games</span></td>
                            <td style="color:var(--text-dim)">[GameDev]</td>
                        </tr>
                    </table>
                `
            },
            {
                cmd: '',
                output: '' // Пустая строка для финального курсора
            }
        ];

        let step = 0;

        async function typeWriter(text, element) {
            return new Promise(resolve => {
                let i = 0;
                element.innerHTML = '';
                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        setTimeout(type, Math.random() * 50 + 30); // Случайная скорость печати
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }

        async function runTerminal() {
            for (const item of data) {
                // Создаем строку ввода
                const line = document.createElement('div');
                line.style.marginBottom = '5px';
                
                // Формируем HTML для промпта
                const promptSpan = `<span class="prompt">[siright@endeavouros]</span> <span class="path">~</span>$ `;
                
                // Контейнер для команды (чтобы курсор был рядом)
                const cmdSpan = document.createElement('span');
                cmdSpan.className = 'command';
                
                line.innerHTML = promptSpan;
                line.appendChild(cmdSpan);
                
                // Добавляем курсор
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                line.appendChild(cursor);
                
                terminalContent.appendChild(line);

                // Скролл вниз
                terminalContent.scrollTop = terminalContent.scrollHeight;

                if (item.cmd) {
                    // Эффект печати
                    await typeWriter(item.cmd, cmdSpan);
                    
                    // Пауза перед выводом результата
                    await new Promise(r => setTimeout(r, 300));
                    
                    // Удаляем курсор со строки команды
                    cursor.remove();

                    // Выводим результат (HTML)
                    const outputDiv = document.createElement('div');
                    outputDiv.className = 'output';
                    outputDiv.innerHTML = item.output;
                    terminalContent.appendChild(outputDiv);
                    
                    // Пауза перед следующей командой
                    await new Promise(r => setTimeout(r, 600));
                } else {
                    // Финальный промпт, курсор остается
                }
                
                terminalContent.scrollTop = terminalContent.scrollHeight;
            }
        }

        // Запуск через небольшую задержку
        setTimeout(runTerminal, 1000);

    </script>
</body>
</html>

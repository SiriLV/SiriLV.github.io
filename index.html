<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri_Lv | Siright - Developer Portfolio</title>
    <style>
        :root {
            --bg-color: #1a0a2e;
            --term-bg: rgba(18, 8, 32, 0.92);
            --primary: #bd00ff;
            --secondary: #ff0055;
            --text-main: #eaeaea;
            --text-dim: #777;
            --accent: #2d1b4e;
            --font-stack: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.15) 50%,
                rgba(0,0,0,0.15)
            );
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.4;
        }

        .terminal-window {
            position: relative;
            z-index: 3;
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: var(--term-bg);
            border: 1px solid var(--accent);
            border-radius: 6px;
            box-shadow: 0 8px 32px rgba(100, 0, 180, 0.25), inset 0 0 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
            animation: terminalOpen 0.6s ease-out;
        }

        .terminal-header {
            background: linear-gradient(180deg, #2a1840 0%, #1e1030 100%);
            padding: 8px 12px;
            border-bottom: 1px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 5px 5px 0 0;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .header-title::before {
            content: "≡";
            font-size: 16px;
            color: var(--primary);
        }

        .window-controls {
            display: flex;
            gap: 6px;
        }

        .window-btn {
            width: 28px;
            height: 22px;
            background: var(--accent);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-dim);
            cursor: default;
            transition: background 0.2s;
        }

        .window-btn:hover {
            background: rgba(189, 0, 255, 0.3);
        }

        .window-btn.close:hover {
            background: rgba(255, 0, 85, 0.4);
        }

        .terminal-body {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            font-size: 15px;
            line-height: 1.6;
        }

        .terminal-body::-webkit-scrollbar {
            width: 6px;
        }
        .terminal-body::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }
        .terminal-body::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .prompt {
            color: var(--secondary);
        }
        .path {
            color: var(--primary);
        }
        .command {
            color: #fff;
        }

        .output {
            margin-bottom: 18px;
            opacity: 0;
            animation: showOutput 0.4s forwards;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 130px 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .label {
            color: var(--primary);
        }

        a {
            color: var(--secondary);
            text-decoration: none;
            border-bottom: 1px dashed var(--secondary);
            transition: all 0.2s;
        }

        a:hover {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 8px var(--secondary);
        }

        .lang-tag {
            display: inline-block;
            padding: 2px 8px;
            border: 1px solid;
            border-radius: 3px;
            font-size: 0.85em;
            margin: 2px 4px 2px 0;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: var(--primary);
            animation: cursorBlink 1.1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes terminalOpen {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes showOutput {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .label {
                margin-bottom: -4px;
            }
            .terminal-body {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <div class="scanlines"></div>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="header-title">
                <span>siright@endeavouros: ~/portfolio</span>
            </div>
            <div class="window-controls">
                <div class="window-btn">─</div>
                <div class="window-btn">□</div>
                <div class="window-btn close">✕</div>
            </div>
        </div>
        <div class="terminal-body" id="terminalContent"></div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;

            const fontSize = 18;
            const columns = Math.floor(w / fontSize);
            const drops = [];

            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }

            const colors = ['#bd00ff', '#9900cc', '#7700aa', '#ff0055', '#cc0044', '#aa0066'];

            function getColor(x, t) {
                const idx = Math.floor((Math.sin(x * 0.1 + t * 0.0008) + 1) * 3) % colors.length;
                return colors[idx];
            }

            let time = 0;

            function draw() {
                ctx.fillStyle = 'rgba(26, 10, 46, 0.04)';
                ctx.fillRect(0, 0, w, h);

                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const char = String.fromCharCode(0x30 + Math.floor(Math.random() * 10));
                    const x = i * fontSize;
                    const y = drops[i] * fontSize;

                    ctx.fillStyle = getColor(i, time);
                    ctx.fillText(char, x, y);

                    if (y > h && Math.random() > 0.985) {
                        drops[i] = 0;
                    }
                    drops[i] += 0.33;
                }

                time++;
                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', function() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });

            draw();
        })();

        (function() {
            const content = document.getElementById('terminalContent');

            const commands = [
                {
                    cmd: './whoami.sh',
                    out: `
                        <div class="info-grid">
                            <span class="label">Имя:</span><span>Роман</span>
                            <span class="label">Псевдоним:</span><span>Siri_Lv <span style="color:var(--text-dim)">//</span> Siright</span>
                            <span class="label">OS:</span><span style="color:#00ddff">EndeavourOS</span> (Arch-based)
                        </div>
                    `
                },
                {
                    cmd: 'cat skills.txt',
                    out: `
                        <div style="margin-top:6px">
                            <span class="label">Языки:</span><br>
                            <span class="lang-tag" style="border-color:#3776ab;color:#3776ab">Python (Main)</span>
                            <span class="lang-tag" style="border-color:#00599C;color:#00599C">C++</span>
                            <span class="lang-tag" style="border-color:#f89820;color:#f89820">Java</span>
                            <span class="lang-tag" style="border-color:#000080;color:#aaf">Lua</span>
                            <span class="lang-tag" style="border-color:#68217A;color:#dcb3ff">C#</span>
                        </div>
                        <div style="margin-top:12px">
                            <span class="label">Движки:</span> Godot Engine<br>
                            <span class="label">Инфраструктура:</span> 3 сервера (2x <span style="color:#fc0">DE</span>, 1x <span style="color:#00247d">UK</span>)
                        </div>
                    `
                },
                {
                    cmd: 'ls -la ./projects/',
                    out: `
                        <table style="width:100%;text-align:left;margin-top:6px;border-collapse:collapse">
                            <tr><td style="padding:5px 0"><a href="https://t.me/Siright_Bot" target="_blank">Ai Telegram Bot</a></td><td style="color:var(--text-dim)">[Telegram Bot]</td></tr>
                            <tr><td style="padding:5px 0">Api Keys Parser</td><td style="color:var(--text-dim)">[Github/Web Scanner]</td></tr>
                            <tr><td style="padding:5px 0"><a href="https://pypi.org/project/ekogram" target="_blank">ekogram</a></td><td style="color:var(--text-dim)">[Python PyPI Module]</td></tr>
                            <tr><td style="padding:5px 0">Godot Games</td><td style="color:var(--text-dim)">[GameDev]</td></tr>
                        </table>
                    `
                },
                { cmd: '', out: '' }
            ];

            function delay(ms) {
                return new Promise(function(r) { setTimeout(r, ms); });
            }

            async function typeText(text, el) {
                for (let i = 0; i < text.length; i++) {
                    el.textContent += text[i];
                    await delay(40 + Math.random() * 60);
                }
            }

            async function run() {
                for (let i = 0; i < commands.length; i++) {
                    const item = commands[i];

                    const line = document.createElement('div');
                    line.style.marginBottom = '6px';

                    const prompt = document.createElement('span');
                    prompt.className = 'prompt';
                    prompt.textContent = '[siright@endeavouros]';

                    const path = document.createElement('span');
                    path.className = 'path';
                    path.textContent = ' ~ ';

                    const dollar = document.createTextNode('$ ');

                    const cmd = document.createElement('span');
                    cmd.className = 'command';

                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';

                    line.appendChild(prompt);
                    line.appendChild(path);
                    line.appendChild(dollar);
                    line.appendChild(cmd);
                    line.appendChild(cursor);

                    content.appendChild(line);
                    content.scrollTop = content.scrollHeight;

                    if (item.cmd) {
                        await typeText(item.cmd, cmd);
                        await delay(250);
                        cursor.remove();

                        const output = document.createElement('div');
                        output.className = 'output';
                        output.innerHTML = item.out;
                        content.appendChild(output);

                        await delay(500);
                    }

                    content.scrollTop = content.scrollHeight;
                }
            }

            setTimeout(run, 800);
        })();
    </script>
</body>
</html>

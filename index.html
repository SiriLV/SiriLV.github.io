<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri_Lv | Siright - Developer Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05000a;
            --term-bg: rgba(13, 0, 26, 0.95);
            --primary: #9d00ff;
            --secondary: #ff0055;
            --text-main: #f0f0f0;
            --text-dim: #888;
            --accent: #2d0a4e;
            --font-stack: 'JetBrains Mono', 'Consolas', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            font-weight: 500;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.8;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
            opacity: 0.3;
        }

        .terminal-window {
            position: relative;
            z-index: 3;
            width: 90%;
            max-width: 850px;
            height: 80vh;
            background: var(--term-bg);
            border: 1px solid #4a0080;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(130, 0, 255, 0.15), 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(5px);
            animation: terminalOpen 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .terminal-header {
            background: linear-gradient(90deg, #1a052b 0%, #11021f 100%);
            padding: 10px 15px;
            border-bottom: 1px solid #4a0080;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 7px 7px 0 0;
            user-select: none;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #ccc;
            letter-spacing: 0.5px;
        }

        .header-title::before {
            content: ">_";
            font-weight: 700;
            color: var(--primary);
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-red { background: #ff5f56; }
        .btn-yellow { background: #ffbd2e; }
        .btn-green { background: #27c93f; }

        .btn-red:hover { background: #ff3b30; box-shadow: 0 0 5px #ff3b30; }

        .terminal-body {
            padding: 25px;
            overflow-y: auto;
            flex-grow: 1;
            font-size: 16px;
            line-height: 1.5;
        }

        .terminal-body::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-body::-webkit-scrollbar-track {
            background: #0a0014;
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: #4a0080;
            border-radius: 4px;
        }
        .terminal-body::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .prompt {
            color: var(--secondary);
            font-weight: 700;
        }
        .path {
            color: var(--primary);
            font-weight: 700;
        }
        .command {
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 2px rgba(255,255,255,0.2);
        }

        .output {
            margin-bottom: 20px;
            opacity: 0;
            animation: showOutput 0.3s forwards;
            color: #dcdcdc;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .label {
            color: var(--primary);
            font-weight: 700;
        }

        a {
            color: var(--secondary);
            text-decoration: none;
            border-bottom: 1px dashed var(--secondary);
            transition: all 0.2s;
            position: relative;
        }

        a:hover {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 10px var(--secondary);
        }

        .lang-tag {
            display: inline-block;
            padding: 3px 8px;
            border: 1px solid;
            border-radius: 4px;
            font-size: 0.9em;
            margin: 4px 6px 4px 0;
            font-weight: 500;
            background: rgba(255,255,255,0.03);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 19px;
            background-color: var(--primary);
            animation: cursorBlink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes terminalOpen {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes showOutput {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .label {
                display: block;
                margin-top: 5px;
            }
            .terminal-body {
                font-size: 14px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <div class="scanlines"></div>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="header-title">
                <span>siright@endeavouros: ~/portfolio</span>
            </div>
            <div class="window-controls">
                <div class="window-btn btn-yellow"></div>
                <div class="window-btn btn-green"></div>
                <div class="window-btn btn-red close"></div>
            </div>
        </div>
        <div class="terminal-body" id="terminalContent"></div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;

            const fontSize = 20;
            const columns = Math.floor(w / fontSize);
            const drops = [];

            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }

            const colors = ['#0f0', '#00ff41', '#20c20e', '#008f11'];

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; 
                ctx.fillRect(0, 0, w, h);

                ctx.font = 'bold ' + fontSize + 'px "JetBrains Mono", monospace';

                for (let i = 0; i < drops.length; i++) {
                    const chars = "01010123456789ABCDEF";
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    
                    const x = i * fontSize;
                    const y = drops[i] * fontSize;

                    const colorIdx = Math.floor(Math.random() * colors.length);
                    ctx.fillStyle = colors[colorIdx];
                    
                    ctx.fillText(char, x, y);
                    if (y > h && Math.random() > 0.99) {
                        drops[i] = 0;
                    }
                    
                    drops[i] += 0.15; 
                }

                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', function() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });

            draw();
        })();

        (function() {
            const content = document.getElementById('terminalContent');

            const commands = [
                {
                    cmd: './whoami.sh',
                    out: `
                        <div class="info-grid">
                            <span class="label">Имя:</span><span>Роман</span>
                            <span class="label">Псевдоним:</span><span>Siri_Lv <span style="color:var(--text-dim)">//</span> Siright</span>
                            <span class="label">OS:</span><span style="color:#00ddff; font-weight:bold;">EndeavourOS</span> (Arch)
                        </div>
                    `
                },
                {
                    cmd: 'cat skills.txt',
                    out: `
                        <div style="margin-top:6px">
                            <span class="label">Языки программирования:</span><br>
                            <span class="lang-tag" style="border-color:#3776ab;color:#4B8BBE">Python (Main)</span>
                            <span class="lang-tag" style="border-color:#00599C;color:#659ad2">C++</span>
                            <span class="lang-tag" style="border-color:#f89820;color:#f89820">Java</span>
                            <span class="lang-tag" style="border-color:#000080;color:#8888ff">Lua</span>
                            <span class="lang-tag" style="border-color:#68217A;color:#dcb3ff">C#</span>
                        </div>
                        <div style="margin-top:12px">
                            <span class="label">Инструменты:</span> Godot Engine, Git, Docker<br>
                            <span class="label">Инфраструктура:</span> 3 сервера (2x <span style="color:#fc0">DE</span>, 1x <span style="color:#00247d">UK</span>)
                        </div>
                    `
                },
                {
                    cmd: 'ls -la ./projects/',
                    out: `
                        <table style="width:100%;text-align:left;margin-top:6px;border-collapse:collapse">
                            <tr>
                                <td style="padding:5px 0"><span style="color:#27c93f;margin-right:10px">drwx</span> <a href="https://t.me/Siright_Bot" target="_blank">Ai Telegram Bot</a></td>
                                <td style="color:var(--text-dim)">[Telegram Bot]</td>
                            </tr>
                            <tr>
                                <td style="padding:5px 0"><span style="color:#27c93f;margin-right:10px">-rwx</span> Api Keys Parser</td>
                                <td style="color:var(--text-dim)">[Scanner]</td>
                            </tr>
                            <tr>
                                <td style="padding:5px 0"><span style="color:#27c93f;margin-right:10px">-rwx</span> <a href="https://pypi.org/project/ekogram" target="_blank">ekogram</a></td>
                                <td style="color:var(--text-dim)">[PyPI Lib]</td>
                            </tr>
                            <tr>
                                <td style="padding:5px 0"><span style="color:#27c93f;margin-right:10px">drwx</span> Godot Games</td>
                                <td style="color:var(--text-dim)">[GameDev]</td>
                            </tr>
                        </table>
                    `
                },
                { cmd: '', out: '' }
            ];

            function delay(ms) {
                return new Promise(function(r) { setTimeout(r, ms); });
            }

            async function typeText(text, el) {
                for (let i = 0; i < text.length; i++) {
                    el.textContent += text[i];
                    await delay(35 + Math.random() * 50);
                }
            }

            async function run() {
                for (let i = 0; i < commands.length; i++) {
                    const item = commands[i];

                    const line = document.createElement('div');
                    line.style.marginBottom = '6px';

                    const prompt = document.createElement('span');
                    prompt.className = 'prompt';
                    prompt.textContent = '[siright@endeavouros]';

                    const path = document.createElement('span');
                    path.className = 'path';
                    path.textContent = ' ~ ';

                    const dollar = document.createTextNode('$ ');

                    const cmd = document.createElement('span');
                    cmd.className = 'command';

                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';

                    line.appendChild(prompt);
                    line.appendChild(path);
                    line.appendChild(dollar);
                    line.appendChild(cmd);
                    line.appendChild(cursor);

                    content.appendChild(line);
                    content.scrollTop = content.scrollHeight;

                    if (item.cmd) {
                        await delay(400);
                        await typeText(item.cmd, cmd);
                        await delay(200);
                        cursor.remove();

                        const output = document.createElement('div');
                        output.className = 'output';
                        output.innerHTML = item.out;
                        content.appendChild(output);

                        await delay(500);
                    }

                    content.scrollTop = content.scrollHeight;
                }
            }

            setTimeout(run, 500);
        })();
    </script>
</body>
</html>

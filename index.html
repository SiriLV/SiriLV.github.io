<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>siright@archlinux: ~</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05000a;
            --term-bg: rgba(10, 5, 16, 0.96);
            --term-header: #1a1025;
            --primary: #a347ff;
            --secondary: #00f0ff;
            --green: #27c93f;
            --text-main: #e6e6e6;
            --font-stack: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .terminal-window {
            position: relative;
            z-index: 10;
            width: 900px;
            max-width: 95%;
            height: 600px;
            background: var(--term-bg);
            border: 1px solid #452b63;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8), 0 0 20px rgba(163, 71, 255, 0.1);
            display: flex;
            flex-direction: column;
            border-radius: 2px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .terminal-header {
            background: var(--term-header);
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 1px solid #333;
            user-select: none;
        }

        .header-title {
            font-size: 13px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .term-icon {
            color: var(--primary);
            font-weight: bold;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .win-btn {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 10px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .win-btn:hover { color: #fff; }
        .win-btn.close:hover { color: #ff4444; }

        .terminal-body {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.5;
            cursor: text;
        }

        .terminal-body::-webkit-scrollbar { width: 10px; }
        .terminal-body::-webkit-scrollbar-track { background: #0f0f15; }
        .terminal-body::-webkit-scrollbar-thumb { background: #333; border: 1px solid #0f0f15; }
        .terminal-body::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .line { margin-bottom: 4px; word-break: break-word; }
        .prompt { color: var(--green); font-weight: 700; }
        .path { color: #5fd7ff; font-weight: 700; }
        .separator { color: #fff; }
        
        #input-line {
            display: flex;
            align-items: center;
        }
        #cmd-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: var(--font-stack);
            font-size: 15px;
            flex-grow: 1;
            outline: none;
            caret-color: var(--primary);
            margin-left: 8px;
            font-weight: 700;
        }

        pre {
            font-family: var(--font-stack);
            white-space: pre-wrap;
            line-height: 1.3;
            margin: 10px 0;
            color: var(--text-main);
        }

        .arch-logo {
            color: #1793d1;
            font-weight: bold;
            float: left;
            margin-right: 20px;
        }

        .fetch-info {
            display: inline-block;
            vertical-align: top;
            margin-top: 5px;
        }

        .fetch-label { color: var(--primary); font-weight: bold; }
        .fetch-val { color: #fff; }

        a { color: var(--secondary); text-decoration: none; border-bottom: 1px dashed var(--secondary); }
        a:hover { background: var(--secondary); color: #000; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="terminal-window" onclick="document.getElementById('cmd-input').focus()">
        <div class="terminal-header">
            <div class="header-title">
                <span class="term-icon">/></span>
                <span>siright@archlinux: ~</span>
            </div>
            <div class="window-controls">
                <div class="win-btn">_</div>
                <div class="win-btn">□</div>
                <div class="win-btn close">✕</div>
            </div>
        </div>
        <div class="terminal-body" id="output">
            <div id="history"></div>
            
            <div id="input-line">
                <span class="prompt">[siright@archlinux]</span>
                <span class="path">~</span>
                <span class="separator">$</span>
                <input type="text" id="cmd-input" autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const fontSize = 16;
        const columns = Math.floor(width / fontSize);
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 0, 10, 0.25)'; 
            ctx.fillRect(0, 0, width, height);

            ctx.font = 'bold ' + fontSize + 'px "JetBrains Mono"';
            
            for (let i = 0; i < drops.length; i++) {
                const text = Math.random() > 0.5 ? '1' : '0';
                
                ctx.fillStyle = '#0f0';
                
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                ctx.fillText(text, x, y);

                if (y > height && Math.random() > 0.985) {
                    drops[i] = 0;
                }

                drops[i] += 0.35; 
            }
            requestAnimationFrame(drawMatrix);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        drawMatrix();

        const input = document.getElementById('cmd-input');
        const historyDiv = document.getElementById('history');
        const terminalBody = document.querySelector('.terminal-body');

        const commandHistory = [];
        let historyIndex = -1;

        window.onload = async () => {
            await typeWriter('Welcome to Siright OS. Type "help" for commands.', 'line', 20);
            input.focus();
        };

        // Обработка ввода
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = this.value.trim();
                if (cmd) {
                    addToHistory(cmd);
                    processCommand(cmd);
                    commandHistory.push(cmd);
                    historyIndex = commandHistory.length;
                } else {
                    addToHistory('');
                }
                this.value = '';
                scrollToBottom();
            } else if (e.key === 'ArrowUp') {
                if (historyIndex > 0) {
                    historyIndex--;
                    this.value = commandHistory[historyIndex];
                }
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    this.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    this.value = '';
                }
            }
        });

        function addToHistory(cmd) {
            const line = document.createElement('div');
            line.className = 'line';
            line.innerHTML = `
                <span class="prompt">[siright@archlinux]</span>
                <span class="path">~</span>
                <span class="separator">$</span>
                <span>${escapeHtml(cmd)}</span>
            `;
            historyDiv.appendChild(line);
        }

        function printOutput(html) {
            const div = document.createElement('div');
            div.className = 'line';
            div.style.color = '#ccc';
            div.innerHTML = html;
            historyDiv.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function processCommand(rawCmd) {
            const args = rawCmd.split(' ');
            const cmd = args[0].toLowerCase();

            switch(cmd) {
                case 'help':
                    printOutput(`
                        <span style="color:var(--primary)">Available commands:</span><br>
                        - <span style="color:var(--secondary)">neofetch</span> : System information<br>
                        - <span style="color:var(--secondary)">ls</span>       : List projects<br>
                        - <span style="color:var(--secondary)">whoami</span>   : About me<br>
                        - <span style="color:var(--secondary)">nano</span>     : [Easter Egg]<br>
                        - <span style="color:var(--secondary)">siri</span>     : [Easter Egg]<br>
                        - <span style="color:var(--secondary)">clear</span>    : Clear terminal
                    `);
                    break;

                case 'clear':
                    historyDiv.innerHTML = '';
                    break;

                case 'neofetch':
                    const logo = `
<span class="arch-logo">
       /\\
      /  \\
     /    \\
    /      \\
   /   ,,   \\
  /   |  |   \\
 /_-''    ''-_\\
</span>`;
                    const info = `
<div class="fetch-info">
    <span class="fetch-label">siright@archlinux</span><br>
    -----------------<br>
    <span class="fetch-label">OS</span>: <span class="fetch-val">Arch Linux x86_64</span><br>
    <span class="fetch-label">Host</span>: <span class="fetch-val">Siright Portfolio</span><br>
    <span class="fetch-label">Kernel</span>: <span class="fetch-val">6.6.9-arch1-1</span><br>
    <span class="fetch-label">Uptime</span>: <span class="fetch-val">Forever</span><br>
    <span class="fetch-label">Shell</span>: <span class="fetch-val">zsh 5.9</span><br>
    <span class="fetch-label">Resolution</span>: <span class="fetch-val">1920x1080</span><br>
    <span class="fetch-label">WM</span>: <span class="fetch-val">Hyprland</span><br>
    <span class="fetch-label">Theme</span>: <span class="fetch-val">Endeavour-Purple</span><br>
    <span class="fetch-label">CPU</span>: <span class="fetch-val">AMD Ryzen 7 5800X (16) @ 3.8GHz</span><br>
    <span class="fetch-label">GPU</span>: <span class="fetch-val">NVIDIA GeForce RTX 3070</span><br>
    <span class="fetch-label">Memory</span>: <span class="fetch-val">32GiB</span>
</div>
<div style="clear:both"></div>
                    `;
                    printOutput(logo + info);
                    break;

                case 'nano':
                    printOutput(`<span style="color:#ffcc00">OnlySQ =></span>`);
                    break;

                case 'siri':
                    printOutput(`<span style="color:#ff79c6">is very cool =]</span>`);
                    break;

                case 'whoami':
                    printOutput(`
                        User: <span style="color:var(--primary)">Siri_Lv</span> (Siright)<br>
                        Role: <span style="color:var(--secondary)">Backend Developer</span><br>
                        Stack: Python, C++, Godot, Linux
                    `);
                    break;

                case 'ls':
                    printOutput(`
                        drwx------  <a href="https://t.me/Siright_Bot" target="_blank">Ai_Bot_Telegram</a><br>
                        -rwx------  <a href="#">Api_Keys_Parser.py</a><br>
                        -rwx------  <a href="https://pypi.org/project/ekogram" target="_blank">ekogram_lib</a><br>
                        drwx------  <a href="#">Godot_Projects</a>
                    `);
                    break;

                case 'sudo':
                    printOutput(`[sudo] password for siright: <span style="color:red">Sorry, try again.</span>`);
                    break;

                default:
                    printOutput(`<span style="color:#ff5555">zsh: command not found: ${escapeHtml(cmd)}</span>`);
            }
        }

        function typeWriter(text, className, speed) {
            return new Promise(resolve => {
                const div = document.createElement('div');
                div.className = className;
                historyDiv.appendChild(div);
                
                let i = 0;
                function type() {
                    if (i < text.length) {
                        div.textContent += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        resolve();
                    }
                }
                type();
            });
        }
    </script>
</body>
</html>

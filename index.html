<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Runner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #0d0018;
            color: #e0e0e0;
            font-family: 'Consolas', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        h1 {
            text-align: center;
            color: #a040e0;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(160, 64, 224, 0.5);
        }

        .status {
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .status.loading { color: #f0a030; }
        .status.ready { color: #40e070; }
        .status.error { color: #f04050; }

        .panel {
            background: rgba(10, 0, 20, 0.9);
            border: 1px solid #2a1050;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(to bottom, #1a0830, #120620);
            padding: 10px 15px;
            border-bottom: 1px solid #2a1050;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            color: #a040e0;
            font-size: 14px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-run {
            background: #1a4025;
            color: #40e070;
            border: 1px solid #2a6035;
        }
        .btn-run:hover:not(:disabled) { background: #2a5535; }
        .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-clear {
            background: #301030;
            color: #c080c0;
            border: 1px solid #502050;
        }
        .btn-clear:hover { background: #402040; }

        .btn-example {
            background: #102040;
            color: #6090d0;
            border: 1px solid #203060;
            margin-right: 8px;
        }
        .btn-example:hover { background: #203050; }

        #editor {
            width: 100%;
            height: 280px;
            background: #050010;
            color: #e0e0e0;
            border: none;
            padding: 15px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
        }

        #output {
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #030008;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #output::-webkit-scrollbar { width: 6px; }
        #output::-webkit-scrollbar-track { background: #0a0015; }
        #output::-webkit-scrollbar-thumb { background: #2a1050; border-radius: 3px; }

        .out-line { margin: 2px 0; }
        .out-stdout { color: #d0d0d0; }
        .out-stderr { color: #f06070; }
        .out-result { color: #40e070; }
        .out-info { color: #6090d0; }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .info-box {
            background: rgba(40, 20, 60, 0.5);
            border: 1px solid #3a1860;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-box code {
            background: #1a0830;
            padding: 2px 6px;
            border-radius: 3px;
            color: #c080e0;
        }

        @media (max-width: 600px) {
            #editor { height: 200px; }
            .examples { flex-direction: column; }
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>🐍 Python in Browser</h1>
    <div class="status loading" id="status">⏳ Loading Pyodide...</div>

    <div class="info-box">
        Python работает прямо в браузере через <code>WebAssembly</code>. 
        Поддерживается стандартная библиотека + <code>numpy</code>, <code>pandas</code>, <code>matplotlib</code> и другие.
        Первая загрузка ~10 МБ, потом кешируется.
    </div>

    <div class="examples">
        <button class="btn btn-example" data-code="hello">Hello World</button>
        <button class="btn btn-example" data-code="math">Math</button>
        <button class="btn btn-example" data-code="loops">Loops</button>
        <button class="btn btn-example" data-code="numpy">NumPy</button>
        <button class="btn btn-example" data-code="fetch">HTTP Request</button>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">📝 Python Code</span>
            <button class="btn btn-run" id="runBtn" disabled>▶ Run</button>
        </div>
        <textarea id="editor" spellcheck="false">
# Напиши свой Python код здесь
print("Hello from Python!")

for i in range(5):
    print(f"Number: {i}")

import sys
print(f"Python version: {sys.version}")
</textarea>
    </div>

    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">💻 Output</span>
            <button class="btn btn-clear" id="clearBtn">Clear</button>
        </div>
        <div id="output"></div>
    </div>
</div>

<script>
// Matrix background
var canvas = document.getElementById('matrix');
var ctx = canvas.getContext('2d');
var W, H, cols, drops;

function initMatrix() {
    W = canvas.width = innerWidth;
    H = canvas.height = innerHeight;
    cols = Math.floor(W / 20);
    drops = [];
    for (var i = 0; i < cols; i++) drops[i] = Math.random() * -50;
}
initMatrix();
addEventListener('resize', initMatrix);

var tick = 0;
function drawMatrix() {
    ctx.fillStyle = 'rgba(13, 0, 24, 0.05)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '15px monospace';

    for (var i = 0; i < cols; i++) {
        var x = i * 20;
        var y = drops[i] * 18;
        var hue = 280 + Math.sin(tick * 0.003 + i * 0.12) * 30;
        ctx.fillStyle = 'hsl(' + hue + ', 70%, 50%)';
        ctx.fillText(String(Math.floor(Math.random() * 10)), x, y);

        if (y > H && Math.random() > 0.99) drops[i] = 0;
        else drops[i] += 0.12;
    }
    tick++;
    requestAnimationFrame(drawMatrix);
}
drawMatrix();
</script>

<!-- Pyodide -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

<script>
var editor = document.getElementById('editor');
var output = document.getElementById('output');
var runBtn = document.getElementById('runBtn');
var clearBtn = document.getElementById('clearBtn');
var status = document.getElementById('status');
var pyodide = null;

var examples = {
    hello: 'print("Hello, World!")\nprint("Python is awesome!")',
    math: 'import math\n\nprint(f"Pi = {math.pi}")\nprint(f"E = {math.e}")\nprint(f"sqrt(2) = {math.sqrt(2)}")\nprint(f"sin(45°) = {math.sin(math.radians(45)):.4f}")',
    loops: 'numbers = [1, 2, 3, 4, 5]\n\nprint("Squares:")\nfor n in numbers:\n    print(f"  {n}² = {n**2}")\n\nprint("\\nList comprehension:")\nsquares = [x**2 for x in range(10)]\nprint(squares)',
    numpy: 'import numpy as np\n\narr = np.array([1, 2, 3, 4, 5])\nprint(f"Array: {arr}")\nprint(f"Mean: {arr.mean()}")\nprint(f"Sum: {arr.sum()}")\n\nmatrix = np.random.rand(3, 3)\nprint(f"\\nRandom 3x3 matrix:\\n{matrix}")',
    fetch: 'from pyodide.http import pyfetch\nimport asyncio\n\nasync def get_ip():\n    response = await pyfetch("https://api.ipify.org?format=json")\n    data = await response.json()\n    print(f"Your IP: {data[\'ip\']}")\n\nawait get_ip()'
};

function log(text, type) {
    var line = document.createElement('div');
    line.className = 'out-line out-' + (type || 'stdout');
    line.textContent = text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

async function initPyodide() {
    try {
        pyodide = await loadPyodide();
        
        // Redirect stdout/stderr
        pyodide.runPython(`
import sys
from io import StringIO

class OutputCapture:
    def __init__(self, callback, stream_type):
        self.callback = callback
        self.stream_type = stream_type
    def write(self, text):
        if text.strip():
            self.callback(text, self.stream_type)
    def flush(self):
        pass
`);
        
        status.textContent = '✓ Ready to run Python';
        status.className = 'status ready';
        runBtn.disabled = false;
        
    } catch (err) {
        status.textContent = '✕ Failed to load: ' + err.message;
        status.className = 'status error';
    }
}

async function runCode() {
    var code = editor.value;
    runBtn.disabled = true;
    runBtn.textContent = '⏳ Running...';
    
    log('>>> Running...', 'info');

    try {
        // Setup output capture
        pyodide.globals.set('js_log', log);
        pyodide.runPython(`
import sys
sys.stdout = OutputCapture(js_log, 'stdout')
sys.stderr = OutputCapture(js_log, 'stderr')
`);

        // Load packages if needed
        await pyodide.loadPackagesFromImports(code);
        
        // Run code
        var result = await pyodide.runPythonAsync(code);
        
        if (result !== undefined && result !== null) {
            log('=> ' + String(result), 'result');
        }
        
        log('>>> Done', 'info');
        
    } catch (err) {
        log(err.message, 'stderr');
    }

    runBtn.disabled = false;
    runBtn.textContent = '▶ Run';
}

clearBtn.onclick = function() {
    output.innerHTML = '';
};

runBtn.onclick = runCode;

// Ctrl+Enter to run
editor.onkeydown = function(e) {
    if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        runCode();
    }
};

// Example buttons
document.querySelectorAll('.btn-example').forEach(function(btn) {
    btn.onclick = function() {
        var key = btn.dataset.code;
        if (examples[key]) {
            editor.value = examples[key];
        }
    };
});

initPyodide();
</script>

</body>
</html>
